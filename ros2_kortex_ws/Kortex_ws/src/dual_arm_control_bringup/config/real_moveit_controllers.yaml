moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  # 🚨 核心關鍵：把原本的單一大控制器，拆解成左、右兩隻獨立手臂的控制器路徑！
  controller_names:
    - left/joint_trajectory_controller
    - right/joint_trajectory_controller

  # 🛠️ 對接左臂的獨立 Action Server (/left/joint_trajectory_controller/follow_joint_trajectory)
  left/joint_trajectory_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - left_joint_1
      - left_joint_2
      - left_joint_3
      - left_joint_4
      - left_joint_5
      - left_joint_6
      - left_joint_7

  # 🛠️ 對接右臂的獨立 Action Server (/right/joint_trajectory_controller/follow_joint_trajectory)
  right/joint_trajectory_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - right_joint_1
      - right_joint_2
      - right_joint_3
      - right_joint_4
      - right_joint_5
      - right_joint_6
      - right_joint_7